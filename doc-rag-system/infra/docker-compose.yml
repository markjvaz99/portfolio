version: "3"

services:

  rag-app:
    build:
      context: ..
      dockerfile: infra/docker/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ../app:/app/app
      - ./data:/app/data
      - ./db:/app/db
    depends_on:
      - ollama
      - qdrant 

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    entrypoint: /bin/sh
    command: -c "ollama serve & sleep 5 && ollama pull phi3:mini && ollama pull nomic-embed-text && wait"

  qdrant: 
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  ollama_data:
  qdrant_data: 